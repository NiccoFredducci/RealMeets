{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <title>RealMeets - Edit</title>
	
	<link rel="stylesheet" href="{% static 'main/css/edit.css' %}">
	<link rel="icon" href="{% static 'main/img/favicon.ico' %}">
</head>

<body>
<h1>Edit Event</h1>
<div class="edit-body" id="edit-body" style="background-color: {{ event.background_color }};">
	<img id="image-preview" src="{% if event.image %} {{ event.image_url }} {% else %} {% static 'main/img/default.png' %} {% endif %}" alt="Event image">
	<form method="POST" enctype="multipart/form-data">
		{% csrf_token %}
		<label class="hidden" for="id_image">Image</label>
		{{ form.image }}
		{{ form.image.errors }}
	
		<label for="id_title">Title</label>
		{{ form.title }}
		{{ form.title.errors }}
	
		<label for="id_description">Description</label>
		{{ form.description }}
		{{ form.description.errors }}
	
		<label for="id_background_color">Background Color</label>
		{{ form.background_color }}
		{{ form.background_color.errors }}
	
		<div style="display: flex; justify-content: space-between;">
			<a class="save-button" draggable="false">
				<button type="submit" style="width: fit-content">Save</button>
			</a>
			<a class="home-button" href="{% url 'home' %}" draggable="false">
				<button type="button" onclick="return confirm('Unsaved changes will be reverted!')">Cancel</button>
			</a>
		</div>
	</form>
	<form method="POST" action="{% url 'delete_event' event.id %}">
		{% csrf_token %}
		<button class="delete" type="submit" onclick="return confirm('Are you sure you want to delete this event?')" style="background: #BB4433;">
			Delete
		</button>
	</form>
		
</div>
</body>
<script>
const imageInput = document.getElementById("id_image");
const preview = document.getElementById("image-preview");
const body = document.getElementById("edit-body");
const picker = document.getElementById("id_background_color");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {
        preview.src = URL.createObjectURL(file);
    }
});

picker.addEventListener("input", () => {
    body.style.backgroundColor = picker.value;
});
</script>
</html>
